<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BANDWIDTH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050505;
    color: #666;
    font-family: 'JetBrains Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
  }

  .shell {
    width: 100%;
    max-width: 480px;
    padding: 0 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* title */
  .title {
    font-size: 9px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #2a2a2a;
    margin-bottom: 64px;
  }

  /* the number */
  .hero {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 200px;
    height: 200px;
    margin-bottom: 24px;
  }

  .hero-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), background 0.8s ease;
    filter: blur(50px);
    transform: scale(0.8);
  }

  .hero.on .hero-glow {
    opacity: 1;
    transform: scale(1);
    animation: breathe 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.12); opacity: 1; }
  }

  /* level 5: white orb, slow and powerful */
  .hero.lv-5 .hero-glow {
    inset: -40px;
    filter: blur(60px);
    animation: orbMax 6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes orbMax {
    0%, 100% { transform: scale(0.9); opacity: 0.7; }
    50% { transform: scale(1.25); opacity: 1; }
  }

  /* level 1: red flicker, unstable */
  .hero.lv-1 .hero-glow {
    inset: -40px;
    filter: blur(50px);
    background: radial-gradient(circle, #a44 0%, #a4440a 50%, transparent 70%) !important;
    animation: orbCrit 3s ease-in-out infinite;
  }

  @keyframes orbCrit {
    0%, 100% { transform: scale(1); opacity: 0.75; }
    50% { transform: scale(0.93); opacity: 0.55; }
  }

  .hero-num {
    position: relative;
    font-size: 144px;
    font-weight: 700;
    line-height: 1;
    color: #1a1a1a;
    z-index: 1;
    transition: color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center;
  }

  .hero-num.swap-out {
    animation: numOut 0.2s cubic-bezier(0.4, 0, 1, 1) forwards;
  }

  .hero-num.swap-in {
    animation: numIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  @keyframes numOut {
    0% { transform: scale(1); opacity: 1; filter: blur(0); }
    100% { transform: scale(0.85); opacity: 0; filter: blur(4px); }
  }

  @keyframes numIn {
    0% { transform: scale(1.3); opacity: 0; filter: blur(4px); }
    60% { opacity: 1; filter: blur(0); }
    80% { transform: scale(0.97); }
    100% { transform: scale(1); opacity: 1; filter: blur(0); }
  }

  /* signal + desc */
  .signal {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 8px;
    min-height: 16px;
    transition: color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .signal.fade {
    animation: textSwap 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .desc {
    font-size: 10px;
    letter-spacing: 1px;
    color: #282828;
    text-align: center;
    line-height: 1.7;
    max-width: 320px;
    min-height: 32px;
    margin-bottom: 48px;
    transition: color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .desc.fade {
    animation: textSwap 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes textSwap {
    0% { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* selector */
  .selector {
    display: flex;
    gap: 12px;
    margin-bottom: 48px;
    position: relative;
  }

  .sel {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 500;
    color: #282828;
    cursor: pointer;
    position: relative;
    border-radius: 50%;
    border: 1px solid #1a1a1a;
    transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                background 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .sel:active {
    transform: scale(0.88);
  }

  .sel.on {
    color: #050505;
    background: var(--sel-color);
    border-color: var(--sel-color);
    box-shadow: 0 0 20px color-mix(in srgb, var(--sel-color) 30%, transparent);
  }

  .sel.on.pop {
    animation: selPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes selPop {
    0% { transform: scale(0.8); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .sel:not(.on):hover {
    border-color: #2a2a2a;
    color: #444;
  }

  /* log */
  .log-area {
    width: 100%;
    max-height: 120px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 24px;
  }

  .log-area::-webkit-scrollbar { width: 2px; }
  .log-area::-webkit-scrollbar-track { background: transparent; }
  .log-area::-webkit-scrollbar-thumb { background: #1a1a1a; }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .log-row {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 1px;
    color: #1e1e1e;
    padding: 3px 0;
    animation: logIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) backwards;
  }

  .log-row:nth-child(1) { animation-delay: 0s; }
  .log-row:nth-child(2) { animation-delay: 0.03s; }
  .log-row:nth-child(3) { animation-delay: 0.06s; }
  .log-row:nth-child(4) { animation-delay: 0.09s; }
  .log-row:nth-child(5) { animation-delay: 0.12s; }

  @keyframes logIn {
    0% { opacity: 0; transform: translateY(-4px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .log-row .log-level {
    transition: color 0.3s ease;
  }

  .log-empty {
    font-size: 9px;
    letter-spacing: 3px;
    color: #1a1a1a;
    text-align: center;
    text-transform: uppercase;
  }

  /* bottom controls */
  .controls {
    display: flex;
    gap: 6px;
  }

  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1e1e1e;
    background: none;
    border: 1px solid #141414;
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: color 0.3s ease, border-color 0.3s ease;
  }

  .ctrl-btn:hover { color: #444; border-color: #333; }
  .ctrl-btn.warn { color: #633; border-color: #422; }

  .import-wrap {
    display: inline-block;
  }

  .import-wrap input { display: none; }

  /* mobile */
  @media (max-width: 480px) {
    .shell { padding: 0 24px; }
    .title { margin-bottom: 40px; }
    .hero { width: 160px; height: 160px; margin-bottom: 20px; }
    .hero-num { font-size: 112px; }
    .desc { margin-bottom: 32px; }
    .sel { width: 44px; height: 44px; font-size: 14px; }
    .selector { gap: 10px; margin-bottom: 36px; }
  }

  @media (max-width: 360px) {
    .hero { width: 140px; height: 140px; }
    .hero-num { font-size: 96px; }
    .sel { width: 40px; height: 40px; font-size: 13px; }
    .selector { gap: 8px; }
  }
</style>
</head>
<body>

<div class="shell">
  <div class="title">bandwidth</div>

  <div class="hero" id="hero">
    <div class="hero-glow" id="heroGlow"></div>
    <div class="hero-num" id="heroNum">&mdash;</div>
  </div>

  <div class="signal" id="signal"></div>
  <div class="desc" id="desc">tap a level to check in</div>

  <div class="selector" id="selector">
    <div class="sel" data-n="1" onclick="setLevel(1)" style="--sel-color:#a44">1</div>
    <div class="sel" data-n="2" onclick="setLevel(2)" style="--sel-color:#a84">2</div>
    <div class="sel" data-n="3" onclick="setLevel(3)" style="--sel-color:#8a6">3</div>
    <div class="sel" data-n="4" onclick="setLevel(4)" style="--sel-color:#aa8">4</div>
    <div class="sel" data-n="5" onclick="setLevel(5)" style="--sel-color:#e0e0e0">5</div>
  </div>

  <div class="log-area">
    <div class="log-list" id="log">
      <div class="log-empty">no readings yet</div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="exportLog()">export</button>
    <label class="ctrl-btn import-wrap">
      import
      <input type="file" accept=".json" onchange="importLog(event)">
    </label>
    <button class="ctrl-btn" id="resetBtn" onclick="confirmReset()">clear</button>
  </div>
</div>

<script>
const LEVELS = {
  5: { signal: 'full signal', desc: 'sharp. take on hard work, social events, creative sessions.', color: '#e0e0e0', glow: '#ffffff' },
  4: { signal: 'running clean', desc: 'slight hum in the background. normal operating mode.', color: '#aa8', glow: '#aa8' },
  3: { signal: 'inputs rising', desc: 'attention splitting. wrap up. no new commitments.', color: '#8a6', glow: '#8a6' },
  2: { signal: 'overload', desc: 'exit the environment. decompress alone. no decisions.', color: '#a84', glow: '#a84' },
  1: { signal: 'shutdown', desc: 'dark room. nothing else until you hit 3.', color: '#a44', glow: '#a44' }
};

const STORE = 'bandwidth_log';
let current = null;

function load() {
  try { return JSON.parse(localStorage.getItem(STORE)) || []; }
  catch { return []; }
}

function save(log) { localStorage.setItem(STORE, JSON.stringify(log)); }

function fmtTime(ts) {
  const d = new Date(ts);
  const mo = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][d.getMonth()];
  let h = d.getHours(); const m = String(d.getMinutes()).padStart(2,'0');
  const ap = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
  return `${mo} ${d.getDate()}  ${h}:${m}${ap}`;
}

function renderLog() {
  const log = load();
  const el = document.getElementById('log');
  if (!log.length) { el.innerHTML = '<div class="log-empty">no readings yet</div>'; return; }
  el.innerHTML = log.slice().reverse().map(e => {
    const l = LEVELS[e.level];
    return `<div class="log-row"><span>${fmtTime(e.ts)}</span><span class="log-level" style="color:${l.color}">${e.level} ${l.signal}</span></div>`;
  }).join('');
}

function showLevel(n, animate) {
  const prev = current;
  current = n;
  const l = LEVELS[n];
  const hero = document.getElementById('hero');
  const num = document.getElementById('heroNum');
  const glow = document.getElementById('heroGlow');
  const sig = document.getElementById('signal');
  const desc = document.getElementById('desc');

  hero.className = 'hero on lv-' + n;
  glow.style.background = `radial-gradient(circle, ${l.glow}30 0%, ${l.glow}10 40%, transparent 70%)`;

  if (animate && prev !== null) {
    // number swap animation
    num.classList.remove('swap-in');
    num.classList.add('swap-out');
    setTimeout(() => {
      num.textContent = n;
      num.style.color = l.color;
      num.classList.remove('swap-out');
      num.classList.add('swap-in');
      num.addEventListener('animationend', () => num.classList.remove('swap-in'), { once: true });
    }, 180);

    // text fade
    sig.classList.remove('fade');
    desc.classList.remove('fade');
    void sig.offsetWidth;
    sig.textContent = l.signal;
    sig.style.color = l.color;
    sig.classList.add('fade');
    desc.textContent = l.desc;
    desc.style.color = '#444';
    desc.classList.add('fade');
  } else {
    num.textContent = n;
    num.style.color = l.color;
    sig.textContent = l.signal;
    sig.style.color = l.color;
    desc.textContent = l.desc;
    desc.style.color = '#444';
  }

  document.querySelectorAll('.sel').forEach(s => {
    const isOn = parseInt(s.dataset.n) === n;
    const wasOn = s.classList.contains('on');
    s.classList.toggle('on', isOn);
    if (isOn && !wasOn && animate) {
      s.classList.remove('pop');
      void s.offsetWidth;
      s.classList.add('pop');
      s.addEventListener('animationend', () => s.classList.remove('pop'), { once: true });
    }
  });
}

function setLevel(n) {
  if (n < 1 || n > 5) return;
  showLevel(n, true);
  const log = load();
  log.push({ level: n, ts: Date.now() });
  if (log.length > 100) log.splice(0, log.length - 100);
  save(log);
  renderLog();
}

function exportLog() {
  const log = load();
  if (!log.length) return;
  const blob = new Blob([JSON.stringify(log, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bandwidth-log.json'; a.click();
  URL.revokeObjectURL(url);
}

function importLog(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) return;
      const merged = load().concat(imported);
      merged.sort((a, b) => a.ts - b.ts);
      const seen = new Set();
      const deduped = merged.filter(e => { if (seen.has(e.ts)) return false; seen.add(e.ts); return true; });
      if (deduped.length > 100) deduped.splice(0, deduped.length - 100);
      save(deduped);
      renderLog();
      if (deduped.length) showLevel(deduped[deduped.length - 1].level);
    } catch {}
  };
  reader.readAsText(file);
  e.target.value = '';
}

let resetPending = false, resetTimer = null;
function confirmReset() {
  const btn = document.getElementById('resetBtn');
  if (!resetPending) {
    resetPending = true;
    btn.textContent = 'confirm';
    btn.classList.add('warn');
    resetTimer = setTimeout(() => { resetPending = false; btn.textContent = 'clear'; btn.classList.remove('warn'); }, 3000);
  } else {
    clearTimeout(resetTimer);
    resetPending = false;
    localStorage.removeItem(STORE);
    current = null;
    document.getElementById('hero').className = 'hero';
    document.getElementById('heroNum').textContent = '\u2014';
    document.getElementById('heroNum').style.color = '#1a1a1a';
    document.getElementById('heroGlow').style.background = 'none';
    document.getElementById('signal').textContent = '';
    document.getElementById('desc').textContent = 'tap a level to check in';
    document.getElementById('desc').style.color = '';
    document.querySelectorAll('.sel').forEach(s => s.classList.remove('on'));
    btn.textContent = 'clear';
    btn.classList.remove('warn');
    renderLog();
  }
}

document.addEventListener('keydown', e => {
  const n = parseInt(e.key);
  if (n >= 1 && n <= 5) setLevel(n);
});

(function init() {
  const log = load();
  if (log.length) {
    const last = log[log.length - 1];
    if (Date.now() - last.ts < 12 * 60 * 60 * 1000) showLevel(last.level);
  }
  renderLog();
})();
</script>

</body>
</html>
