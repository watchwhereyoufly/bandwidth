<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BANDWIDTH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --dim: #333;
    --mid: #555;
    --text: #999;
    --bright: #ccc;
    --white: #eee;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    -webkit-user-select: none;
    user-select: none;
  }

  .container {
    width: 100%;
    max-width: 520px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .header {
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--mid);
    text-align: center;
  }

  /* the meter */
  .meter {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
    cursor: pointer;
    transition: opacity 0.4s ease;
    position: relative;
  }

  .bar::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: #1a1a1a;
  }

  .bar:last-child::after { display: none; }

  .bar-num {
    font-size: 32px;
    font-weight: 700;
    width: 40px;
    text-align: center;
    transition: color 0.4s ease, text-shadow 0.4s ease;
    color: var(--dim);
  }

  .bar-fill-wrap {
    flex: 1;
    height: 28px;
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1), background 0.4s ease;
  }

  .bar-ascii {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 1;
  }

  .bar-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dim);
    min-width: 60px;
    text-align: right;
    transition: color 0.4s ease;
  }

  /* level colors */
  .bar[data-level="5"] .bar-fill { background: #1a3a1a; }
  .bar[data-level="4"] .bar-fill { background: #2a3a1a; }
  .bar[data-level="3"] .bar-fill { background: #3a3a1a; }
  .bar[data-level="2"] .bar-fill { background: #3a2a1a; }
  .bar[data-level="1"] .bar-fill { background: #3a1a1a; }

  .bar.active .bar-num { color: var(--white); }
  .bar.active[data-level="5"] .bar-num { color: #4a9; text-shadow: 0 0 20px #4a93; }
  .bar.active[data-level="4"] .bar-num { color: #8a6; text-shadow: 0 0 20px #8a63; }
  .bar.active[data-level="3"] .bar-num { color: #aa8; text-shadow: 0 0 20px #aa83; }
  .bar.active[data-level="2"] .bar-num { color: #a84; text-shadow: 0 0 20px #a843; }
  .bar.active[data-level="1"] .bar-num { color: #a44; text-shadow: 0 0 20px #a443; }

  .bar.active .bar-label { color: var(--bright); }
  .bar.active .bar-ascii { opacity: 0.6; }
  .bar.active .bar-fill { width: 100%; }

  .bar.below .bar-fill { width: 100%; }
  .bar.below .bar-ascii { opacity: 0.3; }

  .bar:not(.active):not(.below) { opacity: 0.35; }

  /* status line */
  .status {
    width: 100%;
    text-align: center;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .status-signal {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: color 0.4s ease;
  }

  .status-desc {
    font-size: 11px;
    color: var(--mid);
    max-width: 360px;
    line-height: 1.6;
    text-align: center;
  }

  /* log */
  .log-wrap {
    width: 100%;
    max-height: 100px;
    overflow: hidden;
  }

  .log {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .log-entry {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  .log-entry span:last-child {
    color: var(--mid);
  }

  .log-empty {
    font-size: 10px;
    letter-spacing: 2px;
    color: #222;
    text-align: center;
    text-transform: uppercase;
  }

  /* keyboard hint */
  .hint {
    font-size: 9px;
    letter-spacing: 3px;
    color: #222;
    text-transform: uppercase;
    text-align: center;
  }

  /* pulse animation on active number */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .bar.active .bar-num {
    animation: pulse 3s ease-in-out infinite;
  }

  /* scan line overlay */
  .scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* mobile */
  @media (max-width: 480px) {
    .container { gap: 24px; padding: 0 20px; }
    .bar { padding: 12px 0; gap: 12px; }
    .bar-num { font-size: 28px; width: 32px; }
    .bar-fill-wrap { height: 24px; }
    .bar-ascii { font-size: 10px; }
  }
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="container">
  <div class="header">bandwidth</div>

  <div class="meter" id="meter">
    <div class="bar" data-level="5" onclick="setLevel(5)">
      <div class="bar-num">5</div>
      <div class="bar-fill-wrap">
        <div class="bar-fill"></div>
        <div class="bar-ascii">|||||||||||||||||||||||||||||||||||||||||||||||||</div>
      </div>
      <div class="bar-label">green</div>
    </div>
    <div class="bar" data-level="4" onclick="setLevel(4)">
      <div class="bar-num">4</div>
      <div class="bar-fill-wrap">
        <div class="bar-fill"></div>
        <div class="bar-ascii">||||||||||||||||||||||||||||||||||||||</div>
      </div>
      <div class="bar-label">green</div>
    </div>
    <div class="bar" data-level="3" onclick="setLevel(3)">
      <div class="bar-num">3</div>
      <div class="bar-fill-wrap">
        <div class="bar-fill"></div>
        <div class="bar-ascii">|||||||||||||||||||||||||||</div>
      </div>
      <div class="bar-label">yellow</div>
    </div>
    <div class="bar" data-level="2" onclick="setLevel(2)">
      <div class="bar-num">2</div>
      <div class="bar-fill-wrap">
        <div class="bar-fill"></div>
        <div class="bar-ascii">||||||||||||||||</div>
      </div>
      <div class="bar-label">orange</div>
    </div>
    <div class="bar" data-level="1" onclick="setLevel(1)">
      <div class="bar-num">1</div>
      <div class="bar-fill-wrap">
        <div class="bar-fill"></div>
        <div class="bar-ascii">|||||</div>
      </div>
      <div class="bar-label">red</div>
    </div>
  </div>

  <div class="status" id="status">
    <div class="status-signal" id="statusSignal">press 1-5</div>
    <div class="status-desc" id="statusDesc">or tap a level to check in</div>
  </div>

  <div class="log-wrap">
    <div class="log" id="log">
      <div class="log-empty">no readings yet</div>
    </div>
  </div>

  <div class="hint">keys 1-5 to set / r to reset</div>
</div>

<script>
const DATA = {
  5: {
    signal: 'locked in',
    desc: 'sharp. take on hard work, social events, creative sessions.',
    color: '#4a9'
  },
  4: {
    signal: 'running clean',
    desc: 'slight hum in the background. normal operating mode.',
    color: '#8a6'
  },
  3: {
    signal: 'inputs rising',
    desc: 'attention splitting. wrap up. no new commitments.',
    color: '#aa8'
  },
  2: {
    signal: 'overload',
    desc: 'exit the environment. decompress alone. no decisions.',
    color: '#a84'
  },
  1: {
    signal: 'shutdown',
    desc: 'dark room. box breathing. nothing else until you hit 3.',
    color: '#a44'
  }
};

const STORAGE_KEY = 'bandwidth_log';
let currentLevel = null;

function getLog() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveLog(log) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(log));
}

function formatTime(ts) {
  const d = new Date(ts);
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const mon = months[d.getMonth()];
  const day = d.getDate();
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${mon} ${day}  ${h}:${m}${ampm}`;
}

function renderLog() {
  const log = getLog();
  const el = document.getElementById('log');

  if (log.length === 0) {
    el.innerHTML = '<div class="log-empty">no readings yet</div>';
    return;
  }

  const recent = log.slice(-6).reverse();
  el.innerHTML = recent.map(entry => {
    const d = DATA[entry.level];
    return `<div class="log-entry">
      <span>${formatTime(entry.ts)}</span>
      <span style="color:${d.color}">${entry.level} ${d.signal}</span>
    </div>`;
  }).join('');
}

function showLevel(n) {
  currentLevel = n;

  document.querySelectorAll('.bar').forEach(bar => {
    const lvl = parseInt(bar.dataset.level);
    bar.classList.remove('active', 'below');
    if (lvl === n) bar.classList.add('active');
    else if (lvl < n) bar.classList.add('below');
  });

  const d = DATA[n];
  const sig = document.getElementById('statusSignal');
  const desc = document.getElementById('statusDesc');
  sig.textContent = d.signal;
  sig.style.color = d.color;
  desc.textContent = d.desc;
}

function setLevel(n) {
  if (n < 1 || n > 5) return;
  showLevel(n);

  const log = getLog();
  log.push({ level: n, ts: Date.now() });
  if (log.length > 100) log.splice(0, log.length - 100);
  saveLog(log);
  renderLog();
}

// keyboard
document.addEventListener('keydown', e => {
  const n = parseInt(e.key);
  if (n >= 1 && n <= 5) setLevel(n);
  if (e.key === 'r' || e.key === 'R') {
    localStorage.removeItem(STORAGE_KEY);
    currentLevel = null;
    document.querySelectorAll('.bar').forEach(b => b.classList.remove('active', 'below'));
    document.getElementById('statusSignal').textContent = 'press 1-5';
    document.getElementById('statusSignal').style.color = '';
    document.getElementById('statusDesc').textContent = 'or tap a level to check in';
    renderLog();
  }
});

// restore last state
(function init() {
  const log = getLog();
  if (log.length > 0) {
    const last = log[log.length - 1];
    // only restore if within last 12 hours
    if (Date.now() - last.ts < 12 * 60 * 60 * 1000) {
      showLevel(last.level);
    }
  }
  renderLog();
})();
</script>

</body>
</html>
