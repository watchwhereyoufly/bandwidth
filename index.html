<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BANDWIDTH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050505;
    color: #666;
    font-family: 'JetBrains Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
  }

  .shell {
    width: 100%;
    max-width: 480px;
    padding: 0 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* title */
  .title {
    font-size: 9px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #2a2a2a;
    margin-bottom: 64px;
  }

  /* the number */
  .hero {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 200px;
    height: 200px;
    margin-bottom: 24px;
  }

  .hero-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.8s ease, background 0.6s ease;
    filter: blur(40px);
  }

  .hero-num {
    position: relative;
    font-size: 144px;
    font-weight: 700;
    line-height: 1;
    color: #1a1a1a;
    transition: color 0.5s ease;
    z-index: 1;
  }

  .hero.on .hero-glow { opacity: 1; }

  /* signal + desc */
  .signal {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 8px;
    min-height: 16px;
    transition: color 0.5s ease;
  }

  .desc {
    font-size: 10px;
    letter-spacing: 1px;
    color: #282828;
    text-align: center;
    line-height: 1.7;
    max-width: 320px;
    min-height: 32px;
    margin-bottom: 48px;
    transition: color 0.5s ease;
  }

  /* selector */
  .selector {
    display: flex;
    gap: 0;
    margin-bottom: 48px;
    position: relative;
  }

  .sel {
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 500;
    color: #222;
    cursor: pointer;
    position: relative;
    transition: color 0.4s ease;
  }

  .sel::after {
    content: '';
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 16px;
    height: 2px;
    border-radius: 1px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease;
  }

  .sel.on {
    color: var(--sel-color);
  }

  .sel.on::after {
    transform: translateX(-50%) scaleX(1);
    background: var(--sel-color);
  }

  .sel:not(.on):hover {
    color: #444;
  }

  /* dividers between selector numbers */
  .sel + .sel::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 16px;
    background: #151515;
  }

  /* log */
  .log-area {
    width: 100%;
    max-height: 120px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 24px;
  }

  .log-area::-webkit-scrollbar { width: 2px; }
  .log-area::-webkit-scrollbar-track { background: transparent; }
  .log-area::-webkit-scrollbar-thumb { background: #1a1a1a; }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .log-row {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 1px;
    color: #1e1e1e;
    padding: 3px 0;
  }

  .log-row .log-level {
    transition: color 0.3s ease;
  }

  .log-empty {
    font-size: 9px;
    letter-spacing: 3px;
    color: #1a1a1a;
    text-align: center;
    text-transform: uppercase;
  }

  /* bottom controls */
  .controls {
    display: flex;
    gap: 6px;
  }

  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1e1e1e;
    background: none;
    border: 1px solid #141414;
    padding: 7px 16px;
    cursor: pointer;
    transition: color 0.3s ease, border-color 0.3s ease;
  }

  .ctrl-btn:hover { color: #444; border-color: #333; }
  .ctrl-btn.warn { color: #633; border-color: #422; }

  .import-wrap {
    display: inline-block;
  }

  .import-wrap input { display: none; }

  /* mobile */
  @media (max-width: 480px) {
    .shell { padding: 0 24px; }
    .title { margin-bottom: 40px; }
    .hero { width: 160px; height: 160px; margin-bottom: 20px; }
    .hero-num { font-size: 112px; }
    .desc { margin-bottom: 32px; }
    .sel { width: 48px; height: 48px; font-size: 15px; }
    .selector { margin-bottom: 36px; }
  }

  @media (max-width: 360px) {
    .hero { width: 140px; height: 140px; }
    .hero-num { font-size: 96px; }
    .sel { width: 44px; height: 44px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="shell">
  <div class="title">bandwidth</div>

  <div class="hero" id="hero">
    <div class="hero-glow" id="heroGlow"></div>
    <div class="hero-num" id="heroNum">&mdash;</div>
  </div>

  <div class="signal" id="signal"></div>
  <div class="desc" id="desc">tap a level to check in</div>

  <div class="selector" id="selector">
    <div class="sel" data-n="1" onclick="setLevel(1)" style="--sel-color:#a44">1</div>
    <div class="sel" data-n="2" onclick="setLevel(2)" style="--sel-color:#a84">2</div>
    <div class="sel" data-n="3" onclick="setLevel(3)" style="--sel-color:#aa8">3</div>
    <div class="sel" data-n="4" onclick="setLevel(4)" style="--sel-color:#8a6">4</div>
    <div class="sel" data-n="5" onclick="setLevel(5)" style="--sel-color:#4a9">5</div>
  </div>

  <div class="log-area">
    <div class="log-list" id="log">
      <div class="log-empty">no readings yet</div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="exportLog()">export</button>
    <label class="ctrl-btn import-wrap">
      import
      <input type="file" accept=".json" onchange="importLog(event)">
    </label>
    <button class="ctrl-btn" id="resetBtn" onclick="confirmReset()">clear</button>
  </div>
</div>

<script>
const LEVELS = {
  5: { signal: 'full signal', desc: 'sharp. take on hard work, social events, creative sessions.', color: '#4a9', glow: '#4a9' },
  4: { signal: 'running clean', desc: 'slight hum in the background. normal operating mode.', color: '#8a6', glow: '#8a6' },
  3: { signal: 'inputs rising', desc: 'attention splitting. wrap up. no new commitments.', color: '#aa8', glow: '#aa8' },
  2: { signal: 'overload', desc: 'exit the environment. decompress alone. no decisions.', color: '#a84', glow: '#a84' },
  1: { signal: 'shutdown', desc: 'dark room. nothing else until you hit 3.', color: '#a44', glow: '#a44' }
};

const STORE = 'bandwidth_log';
let current = null;

function load() {
  try { return JSON.parse(localStorage.getItem(STORE)) || []; }
  catch { return []; }
}

function save(log) { localStorage.setItem(STORE, JSON.stringify(log)); }

function fmtTime(ts) {
  const d = new Date(ts);
  const mo = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][d.getMonth()];
  let h = d.getHours(); const m = String(d.getMinutes()).padStart(2,'0');
  const ap = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
  return `${mo} ${d.getDate()}  ${h}:${m}${ap}`;
}

function renderLog() {
  const log = load();
  const el = document.getElementById('log');
  if (!log.length) { el.innerHTML = '<div class="log-empty">no readings yet</div>'; return; }
  el.innerHTML = log.slice().reverse().map(e => {
    const l = LEVELS[e.level];
    return `<div class="log-row"><span>${fmtTime(e.ts)}</span><span class="log-level" style="color:${l.color}">${e.level} ${l.signal}</span></div>`;
  }).join('');
}

function showLevel(n) {
  current = n;
  const l = LEVELS[n];
  const hero = document.getElementById('hero');
  const num = document.getElementById('heroNum');
  const glow = document.getElementById('heroGlow');

  hero.classList.add('on');
  num.textContent = n;
  num.style.color = l.color;
  glow.style.background = `radial-gradient(circle, ${l.glow}22 0%, ${l.glow}08 50%, transparent 70%)`;

  document.getElementById('signal').textContent = l.signal;
  document.getElementById('signal').style.color = l.color;
  document.getElementById('desc').textContent = l.desc;
  document.getElementById('desc').style.color = '#444';

  document.querySelectorAll('.sel').forEach(s => {
    s.classList.toggle('on', parseInt(s.dataset.n) === n);
  });
}

function setLevel(n) {
  if (n < 1 || n > 5) return;
  showLevel(n);
  const log = load();
  log.push({ level: n, ts: Date.now() });
  if (log.length > 100) log.splice(0, log.length - 100);
  save(log);
  renderLog();
}

function exportLog() {
  const log = load();
  if (!log.length) return;
  const blob = new Blob([JSON.stringify(log, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bandwidth-log.json'; a.click();
  URL.revokeObjectURL(url);
}

function importLog(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) return;
      const merged = load().concat(imported);
      merged.sort((a, b) => a.ts - b.ts);
      const seen = new Set();
      const deduped = merged.filter(e => { if (seen.has(e.ts)) return false; seen.add(e.ts); return true; });
      if (deduped.length > 100) deduped.splice(0, deduped.length - 100);
      save(deduped);
      renderLog();
      if (deduped.length) showLevel(deduped[deduped.length - 1].level);
    } catch {}
  };
  reader.readAsText(file);
  e.target.value = '';
}

let resetPending = false, resetTimer = null;
function confirmReset() {
  const btn = document.getElementById('resetBtn');
  if (!resetPending) {
    resetPending = true;
    btn.textContent = 'confirm';
    btn.classList.add('warn');
    resetTimer = setTimeout(() => { resetPending = false; btn.textContent = 'clear'; btn.classList.remove('warn'); }, 3000);
  } else {
    clearTimeout(resetTimer);
    resetPending = false;
    localStorage.removeItem(STORE);
    current = null;
    document.getElementById('hero').classList.remove('on');
    document.getElementById('heroNum').textContent = '\u2014';
    document.getElementById('heroNum').style.color = '#1a1a1a';
    document.getElementById('heroGlow').style.background = 'none';
    document.getElementById('signal').textContent = '';
    document.getElementById('desc').textContent = 'tap a level to check in';
    document.getElementById('desc').style.color = '';
    document.querySelectorAll('.sel').forEach(s => s.classList.remove('on'));
    btn.textContent = 'clear';
    btn.classList.remove('warn');
    renderLog();
  }
}

document.addEventListener('keydown', e => {
  const n = parseInt(e.key);
  if (n >= 1 && n <= 5) setLevel(n);
});

(function init() {
  const log = load();
  if (log.length) {
    const last = log[log.length - 1];
    if (Date.now() - last.ts < 12 * 60 * 60 * 1000) showLevel(last.level);
  }
  renderLog();
})();
</script>

</body>
</html>
